<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="post-page">

<div id="reading-progress"></div>

<header class="navbar">
    <div class="nav-container">

        <a href="/" class="logo">Direito</a>

        <button class="menu-toggle" onclick="toggleMenu()">☰</button>

        <nav id="nav-links">
            <a href="/">Início</a>
            <a href="/posts/">Artigos</a>
            <a href="/sobre/">Sobre</a>
        </nav>

    </div>
</header>

<main id="page-transition">
    
<div class="posts-list" style="flex: 3; margin-bottom: 3em;">
  <h1>Artigos</h1>
  
    <div class="post-card">
      
      <a href="/posts/introdu%C3%A7%C3%A3o-ao-direito-civil/">Mini Introdução ao Direito Civil</a>
      <span class="post-date">28 Feb 2026</span>
      <span class="post-author">Por Davi F.</span>
    </div>
  
</div>

<aside class="sidebar">
    <h3>Posts Recentes</h3>
    <ul>
      
      
        <li><a href="/posts/introdu%C3%A7%C3%A3o-ao-direito-civil/">Mini Introdução ao Direito Civil</a></li>
      
    </ul>
</aside>

</main>

<script>
function toggleMenu() {
    document.getElementById("nav-links").classList.toggle("active");
}
</script>

<script>
window.addEventListener('scroll', function() {
  const scrollTop = document.documentElement.scrollTop;
  const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  const progress = (scrollTop / scrollHeight) * 100;
  document.getElementById('reading-progress').style.width = progress + "%";
});
</script>

<script>
function toggleToc() {
    document.getElementById("toc-content").classList.toggle("active");
}
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const sections = document.querySelectorAll(".post h2, .post h3");
    const tocLinks = document.querySelectorAll(".toc a");

    window.addEventListener("scroll", function () {
        let current = "";

        sections.forEach(section => {
            const sectionTop = section.offsetTop;
            if (window.scrollY >= sectionTop - 120) {
                current = section.getAttribute("id");
            }
        });

        tocLinks.forEach(link => {
            link.classList.remove("active");
            if (link.getAttribute("href") === "#" + current) {
                link.classList.add("active");
            }
        });
    });
});
</script>

</body>
</html>
